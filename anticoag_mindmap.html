<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pharmacology of Hemostasis & Antithrombotic Therapy</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ebebea;
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2c;
      --text: #e8e8e2;
      --text2: #a0a09a;
      --text3: #606058;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --info-bg: #0c447c;
      --info-text: #b5d4f4;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    padding: 24px 20px 48px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }
  .subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  button.ctrl {
    font-size: 12px;
    font-family: var(--font);
    padding: 5px 12px;
    border-radius: 6px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: background 0.15s;
  }
  button.ctrl:hover { background: var(--bg2); }

  .node-wrap { margin: 2px 0; }
  .node-row { display: flex; align-items: center; gap: 0; cursor: pointer; user-select: none; }
  .toggle-btn {
    width: 18px; height: 18px; border-radius: 4px;
    border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text2);
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: background 0.15s;
  }
  .toggle-btn:hover { background: var(--bg3); }
  .spacer { width: 18px; flex-shrink: 0; }
  .label {
    padding: 3px 10px; border-radius: 6px; font-size: 13px;
    color: var(--text); margin-left: 4px; flex: 1;
    transition: background 0.1s;
  }
  .label:hover { background: var(--bg2); }
  .children { padding-left: 22px; }
  .children.collapsed { display: none; }
  .connector { display: flex; align-items: stretch; }
  .line-v { width: 1px; background: var(--border); margin: 0 8px 0 9px; flex-shrink: 0; }

  .d0 > .node-row > .label {
    font-size: 15px; font-weight: 600;
    background: var(--info-bg); color: var(--info-text);
    padding: 6px 14px; border-radius: 8px;
  }
  .d1 > .node-row > .label { color: var(--info-text); font-weight: 500; font-size: 13.5px; }
  .d2 > .node-row > .label { color: var(--text); }
  .d3 > .node-row > .label { color: var(--text2); font-size: 12px; }
  .d4 > .node-row > .label { color: var(--text3); font-size: 12px; }
</style>
</head>
<body>
<h1>Pharmacology of Hemostasis &amp; Antithrombotic Therapy</h1>
<p class="subtitle">Click any node or ± button to expand / collapse</p>
<div class="controls">
  <button class="ctrl" onclick="setAll(false)">Expand all</button>
  <button class="ctrl" onclick="setAll(true)">Collapse all</button>
</div>
<div id="tree"></div>
<script>
const data = {
  label: "Pharmacology of Hemostasis & Antithrombotic Therapy",
  children: [
    { label: "Hemostasis Overview", children: [
      { label: "Arterial Thrombosis", children: [
        { label: "Platelet predominant" },
        { label: "High flow prevents factor binding" }
      ]},
      { label: "Venous Thrombosis", children: [
        { label: "Coagulation cascade predominant" },
        { label: "Virchow's Triad", children: [
          { label: "Hypercoagulability" },
          { label: "Abnormal endothelium" },
          { label: "Stasis" }
        ]}
      ]}
    ]},
    { label: "Antiplatelet Agents", children: [
      { label: "Aspirin (ASA)", children: [
        { label: "Irreversible COX-1 inhibition" },
        { label: "Indications: ACS, Stroke, PAD" }
      ]},
      { label: "P2Y12 Inhibitors", children: [
        { label: "Block ADP-induced aggregation" },
        { label: "Clopidogrel (Plavix) — prodrug" },
        { label: "Ticagrelor (Brilinta) — not a prodrug" },
        { label: "Prasugrel" }
      ]},
      { label: "GP IIb/IIIa Inhibitors", children: [
        { label: "Eptifibatide" },
        { label: "Abciximab" },
        { label: "Final common pathway inhibition" },
        { label: "IV administration for acute bridge" }
      ]}
    ]},
    { label: "Anticoagulants", children: [
      { label: "Heparin Derived", children: [
        { label: "Unfractionated Heparin (UFH)", children: [
          { label: "Binds Antithrombin" },
          { label: "Inhibits IIa and Xa" },
          { label: "IV/SQ; PTT/Anti-Xa monitoring" },
          { label: "Reversible with Protamine" }
        ]},
        { label: "LMWH (Enoxaparin)", children: [
          { label: "Predictable weight-based dosing" },
          { label: "Lower risk of HIT" }
        ]}
      ]},
      { label: "Vitamin K Antagonists", children: [
        { label: "Warfarin (Coumadin)" },
        { label: "Inhibits Factors II, VII, IX, X" },
        { label: "Requires INR monitoring" },
        { label: "Reversed by Vitamin K or FFP" }
      ]},
      { label: "Direct Inhibitors (NOACs/DOACs)", children: [
        { label: "Factor Xa Inhibitors", children: [
          { label: "Apixaban (Eliquis)" },
          { label: "Edoxaban" }
        ]},
        { label: "Direct Thrombin Inhibitors", children: [
          { label: "Dabigatran (Pradaxa) — PO" }
        ]}
      ]}
    ]},
    { label: "Fibrinolytics", children: [
      { label: "tPA (Alteplase)" },
      { label: "Cleaves Plasminogen → Plasmin" },
      { label: "Indications: STEMI, Acute Stroke, Massive PE" },
      { label: "Major risk: Intracranial hemorrhage" }
    ]},
    { label: "Complications", children: [
      { label: "Bleeding (general risk)" },
      { label: "Warfarin skin necrosis" }
    ]}
  ]
};

function makeNode(node, depth) {
  const hasKids = node.children && node.children.length > 0;
  const wrap = document.createElement('div');
  wrap.className = `node-wrap d${depth}`;
  const row = document.createElement('div');
  row.className = 'node-row';

  if (hasKids) {
    const btn = document.createElement('div');
    btn.className = 'toggle-btn';
    btn.textContent = '−';
    row.appendChild(btn);
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = node.label;
    row.appendChild(label);

    const childWrap = document.createElement('div');
    childWrap.className = 'children';
    const conn = document.createElement('div');
    conn.className = 'connector';
    const lineV = document.createElement('div');
    lineV.className = 'line-v';
    const inner = document.createElement('div');
    inner.style.flex = '1';
    node.children.forEach(c => inner.appendChild(makeNode(c, depth + 1)));
    conn.appendChild(lineV);
    conn.appendChild(inner);
    childWrap.appendChild(conn);

    let collapsed = false;
    const toggle = () => {
      collapsed = !collapsed;
      childWrap.classList.toggle('collapsed', collapsed);
      btn.textContent = collapsed ? '+' : '−';
    };
    btn.addEventListener('click', e => { e.stopPropagation(); toggle(); });
    label.addEventListener('click', toggle);
    wrap.appendChild(row);
    wrap.appendChild(childWrap);
  } else {
    const sp = document.createElement('div');
    sp.className = 'spacer';
    row.appendChild(sp);
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = node.label;
    row.appendChild(label);
    wrap.appendChild(row);
  }
  return wrap;
}

document.getElementById('tree').appendChild(makeNode(data, 0));

function setAll(collapse) {
  document.querySelectorAll('.children').forEach(el => el.classList.toggle('collapsed', collapse));
  document.querySelectorAll('.toggle-btn').forEach(btn => btn.textContent = collapse ? '+' : '−');
}
</script>
</body>
</html>
