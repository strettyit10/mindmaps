<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clinical Landscape of Congenital Heart Disease</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ebebea;
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #185fa5;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2c;
      --text: #e8e8e2; --text2: #a0a09a; --text3: #606058;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info-bg: #0c447c; --info-text: #b5d4f4;
    }
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 24px 20px 48px; min-height: 100vh; }
  h1 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
  .controls { display: flex; gap: 8px; margin-bottom: 14px; }
  button.ctrl { font-size: 12px; font-family: var(--font); padding: 5px 12px; border-radius: 6px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: background .15s; }
  button.ctrl:hover { background: var(--bg2); }
  .node-wrap { margin: 2px 0; }
  .node-row { display: flex; align-items: center; cursor: pointer; user-select: none; }
  .toggle-btn { width: 18px; height: 18px; border-radius: 4px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: background .15s; }
  .toggle-btn:hover { background: var(--bg3); }
  .spacer { width: 18px; flex-shrink: 0; }
  .label { padding: 3px 10px; border-radius: 6px; font-size: 13px; color: var(--text); margin-left: 4px; flex: 1; transition: background .1s; }
  .label:hover { background: var(--bg2); }
  .children { padding-left: 22px; }
  .children.collapsed { display: none; }
  .connector { display: flex; align-items: stretch; }
  .line-v { width: 1px; background: var(--border); margin: 0 8px 0 9px; flex-shrink: 0; }
  .d0 > .node-row > .label { font-size: 15px; font-weight: 600; background: var(--info-bg); color: var(--info-text); padding: 6px 14px; border-radius: 8px; }
  .d1 > .node-row > .label { color: var(--info-text); font-weight: 500; font-size: 13.5px; }
  .d2 > .node-row > .label { color: var(--text); }
  .d3 > .node-row > .label { color: var(--text2); font-size: 12px; }
  .d4 > .node-row > .label { color: var(--text3); font-size: 12px; }
</style>
</head>
<body>
<h1>Clinical Landscape of Congenital Heart Disease</h1>
<p class="subtitle">Click any node or ± to expand / collapse</p>
<div class="controls">
  <button class="ctrl" onclick="setAll(false)">Expand all</button>
  <button class="ctrl" onclick="setAll(true)">Collapse all</button>
</div>
<div id="tree"></div>
<script>
const data = {"label":"Clinical Landscape of Congenital Heart Disease","children":[{"label":"Congenital Heart Disease (CHD)","children":[{"label":"Epidemiology and Pathogenesis","children":[{"label":"Incidence","children":[{"label":"1-2% of live births","children":[]},{"label":"Increased adult prevalence due to survival","children":[]}]},{"label":"Etiology","children":[{"label":"Idiopathic (Majority)","children":[]},{"label":"Environmental/Teratogens (2%)","children":[]}]},{"label":"Genetic Factors","children":[{"label":"Trisomy 21 (AV canal defects)","children":[]},{"label":"Turner Syndrome (Coarctation, AS)","children":[]},{"label":"22q11.2 Deletion (Conotruncal defects)","children":[]},{"label":"Williams-Beuren (Supravalvular AS)","children":[]}]}]},{"label":"Shunt Lesions (L to R)","children":[{"label":"Atrial Septal Defect (ASD)","children":[{"label":"Types: Ostium Secundum, Primum, Sinus Venosus","children":[]},{"label":"Physiology: RV volume load, RA/RV dilation","children":[]},{"label":"Physical Exam: Fixed split S2, SEM at LUSB","children":[]},{"label":"Clinical: Often asymptomatic until adulthood","children":[]}]},{"label":"Ventricular Septal Defect (VSD)","children":[{"label":"Types: Perimembranous, Muscular, Inlet, Outlet","children":[]},{"label":"Physiology: LV volume load, Pulmonary HTN","children":[]},{"label":"Physical Exam: Harsh holosystolic murmur","children":[]},{"label":"Clinical: CHF and failure to thrive in infancy","children":[]}]},{"label":"Patent Ductus Arteriosus (PDA)","children":[{"label":"Physiology: Continuous L to R shunt","children":[]},{"label":"Clinical: Wide pulse pressure, bounding pulses","children":[]}]},{"label":"Eisenmenger Syndrome","children":[{"label":"Reversal of shunt (R to L)","children":[]},{"label":"Presents with cyanosis and clubbing","children":[]}]}]},{"label":"Obstructive Lesions","children":[{"label":"Narrowing at the aortic isthmus","children":[]},{"label":"BP Gradient: Upper ext HTN, Lower ext hypotension","children":[]},{"label":"Physical Exam: Radial-femoral pulse delay","children":[]},{"label":"Imaging: Rib notching, Figure 3 sign","children":[]}]},{"label":"Complex Cyanotic Lesions","children":[{"label":"Tetralogy of Fallot (TOF)","children":[{"label":"PROVe: PS, RVH, Overriding Aorta, VSD","children":[]},{"label":"Tet Spells: Sudden cyanosis from RVOTO","children":[]},{"label":"X-ray: Boot-shaped heart","children":[]},{"label":"Treatment: Squatting (acute), Surgical repair","children":[]}]},{"label":"Transposition of the Great Arteries","children":[{"label":"Aorta from RV, PA from LV","children":[]},{"label":"Requires mixing (PDA/ASD) for survival","children":[]}]}]}]}]};
function makeNode(node, depth) {
  const hasKids = node.children && node.children.length > 0;
  const wrap = document.createElement('div');
  wrap.className = 'node-wrap d' + depth;
  const row = document.createElement('div');
  row.className = 'node-row';
  if (hasKids) {
    const btn = document.createElement('div');
    btn.className = 'toggle-btn'; btn.textContent = '−';
    row.appendChild(btn);
    const label = document.createElement('div');
    label.className = 'label'; label.textContent = node.label;
    row.appendChild(label);
    const childWrap = document.createElement('div');
    childWrap.className = 'children';
    const conn = document.createElement('div'); conn.className = 'connector';
    const lineV = document.createElement('div'); lineV.className = 'line-v';
    const inner = document.createElement('div'); inner.style.flex = '1';
    node.children.forEach(c => inner.appendChild(makeNode(c, depth + 1)));
    conn.appendChild(lineV); conn.appendChild(inner);
    childWrap.appendChild(conn);
    let collapsed = false;
    const toggle = () => { collapsed = !collapsed; childWrap.classList.toggle('collapsed', collapsed); btn.textContent = collapsed ? '+' : '−'; };
    btn.addEventListener('click', e => { e.stopPropagation(); toggle(); });
    label.addEventListener('click', toggle);
    wrap.appendChild(row); wrap.appendChild(childWrap);
  } else {
    const sp = document.createElement('div'); sp.className = 'spacer'; row.appendChild(sp);
    const label = document.createElement('div'); label.className = 'label'; label.textContent = node.label;
    row.appendChild(label); wrap.appendChild(row);
  }
  return wrap;
}
document.getElementById('tree').appendChild(makeNode(data, 0));
function setAll(collapse) {
  document.querySelectorAll('.children').forEach(el => el.classList.toggle('collapsed', collapse));
  document.querySelectorAll('.toggle-btn').forEach(btn => btn.textContent = collapse ? '+' : '−');
}
</script>
</body>
</html>
